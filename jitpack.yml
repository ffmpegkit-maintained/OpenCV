# JitPack build config. The OpenCV native build is heavy (~20-40 min) and may
# exceed JitPack's build limits — Maven Central is the primary channel. This is
# provided best-effort.
jdk:
  - openjdk17

before_install:
  - yes | sdkmanager --licenses > /dev/null 2>&1 || true
  - sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"
  - sudo apt-get update && sudo apt-get install -y ninja-build ant
  - export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018
  - git submodule update --init --recursive
  - chmod +x build-scripts/build-opencv-android.sh && ./build-scripts/build-opencv-android.sh

install:
  - ./gradlew publishToMavenLocal --no-daemon --stacktrace
