# JitPack relay. OpenCV's native build is too heavy for JitPack, so we download
# the prebuilt AAR from the GitHub release and serve it as
#   com.github.ffmpegkit-maintained:OpenCV:<version>
# Everything runs in a single shell block so variables (incl. JitPack's $VERSION)
# and the generated POM behave correctly.
install:
  - |
    set -euo pipefail
    REL="v5.0.0"
    ART="OpenCV"
    DIR="$HOME/.m2/repository/com/github/ffmpegkit-maintained/$ART/$VERSION"
    echo "VERSION=$VERSION  DIR=$DIR"
    mkdir -p "$DIR"
    curl -fsSL -o "$DIR/$ART-$VERSION.aar" \
      "https://github.com/ffmpegkit-maintained/OpenCV/releases/download/$REL/opencv-contrib-android-5.0.0.aar"
    printf '%s\n' \
      '<?xml version="1.0" encoding="UTF-8"?>' \
      '<project xmlns="http://maven.apache.org/POM/4.0.0">' \
      '  <modelVersion>4.0.0</modelVersion>' \
      '  <groupId>com.github.ffmpegkit-maintained</groupId>' \
      "  <artifactId>$ART</artifactId>" \
      "  <version>$VERSION</version>" \
      '  <packaging>aar</packaging>' \
      '</project>' > "$DIR/$ART-$VERSION.pom"
    echo "Served:"; ls -la "$DIR"
