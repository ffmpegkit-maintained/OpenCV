name: Publish to Maven Central

# Manual only. Builds the OpenCV + selected-contrib SDK, then publishes
# opencv-contrib-android to Maven Central. Publish ONLY after Luc validates.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag to publish (e.g. v5.0.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event.inputs.release_tag }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK r27c + CMake + Ninja
        run: |
          sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"
          sudo apt-get update && sudo apt-get install -y ninja-build ant

      - name: Build OpenCV + selected contrib AAR
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.2.12479018
        run: |
          chmod +x build-scripts/build-opencv-android.sh
          ./build-scripts/build-opencv-android.sh

      # Safety: build + install locally and verify the AAR is NOT empty (real
      # org.opencv native lib present) BEFORE the irreversible Central publish.
      - name: Verify AAR then publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -e
          chmod +x ./gradlew
          ./gradlew :library:publishToMavenLocal --no-configuration-cache --stacktrace
          AAR=$(find ~/.m2/repository/dev/ffmpegkit-maintained/opencv-contrib-android -name "*.aar" | head -1)
          echo "Local AAR: $AAR ($(du -h "$AAR" | cut -f1))"
          if ! unzip -l "$AAR" | grep -qE "jni/.*/libopencv_java5\.so"; then
            echo "::error::AAR has no libopencv_java5.so — empty build, aborting Central publish"; exit 1
          fi
          echo "✓ AAR contains the OpenCV native lib — publishing to Maven Central (irreversible)"
          ./gradlew :library:publishToMavenCentral --no-configuration-cache --stacktrace
